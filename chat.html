<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftSense | Questionnaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkGreen: "#055047", ink: "#1a1a1a", cream: "#ffffeb",
            lavender: "#efd5ff", orange: "#ffa847", coral: "#ff6b4c"
          },
          fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"DM Sans"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #ffffeb; color: #1a1a1a; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    .option-btn { transition: all 0.2s ease; box-shadow: 4px 4px 0px #1a1a1a; }
    .option-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #1a1a1a; }
    .option-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #1a1a1a; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="flex justify-between items-center p-6 border-b border-ink/10 bg-cream z-10">
    <a href="index.html" class="font-serif font-bold text-2xl lowercase hover:text-coral transition-colors">giftsense ✦</a>
    <div id="progress-text" class="text-sm font-bold uppercase tracking-widest text-darkGreen">Step 1 of 3</div>
  </header>

  <main class="flex-1 flex flex-col justify-center max-w-3xl mx-auto w-full p-6" id="quiz-container">
    </main>

  <script>
    // 1. Define the Quiz Questions & Options
    const questions = [
      {
        id: "recipient",
        title: "Who are we finding a gift for today?",
        options: [
          { label: "My Partner", icon: "❤️" },
          { label: "A Friend", icon: "✌️" },
          { label: "Family Member", icon: "🏠" },
          { label: "Treating Myself", icon: "✨" }
        ]
      },
      {
        id: "vibe",
        title: "What is their absolute favorite vibe?",
        options: [
          { label: "Cozy & Cute", desc: "Plushies, desk decor", value: "plush", icon: "🧸" },
          { label: "Aesthetic Room", desc: "Art prints, posters", value: "art", icon: "🖼️" },
          { label: "Game Night", desc: "Board games, strategy", value: "game", icon: "🎲" },
          { label: "Old Soul", desc: "Vinyl records, music", value: "vinyl", icon: "🎵" },
          { label: "Hopeless Romantic", desc: "Flowers, botanicals", value: "flower", icon: "💐" }
        ]
      },
      {
        id: "budget",
        title: "What does the budget look like?",
        options: [
          { label: "Keep it light", desc: "Under ₹1,500", icon: "💸" },
          { label: "Sweet spot", desc: "₹1,500 - ₹4,000", icon: "💰" },
          { label: "Going all out", desc: "Money is no object", icon: "💎" }
        ]
      }
    ];

    let currentStep = 0;
    let userAnswers = {}; // Stores the vibes they clicked

    const container = document.getElementById('quiz-container');
    const progressText = document.getElementById('progress-text');

    // 2. Render the current question
    function renderQuestion() {
      container.innerHTML = ''; // Clear screen
      
      const q = questions[currentStep];
      progressText.innerText = `Step ${currentStep + 1} of ${questions.length}`;

      // Build the Title
      let html = `
        <h1 class="font-serif text-4xl md:text-5xl font-bold mb-8 text-ink fade-in-up text-center leading-tight">
          ${q.title}
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in-up delay-1">
      `;

      // Build the Buttons
      q.options.forEach((opt, index) => {
        // If this is the 'vibe' question, we pass the specific value. Otherwise, just a generic pass.
        const val = opt.value ? `'${opt.value}'` : `'general'`;
        
        html += `
          <button onclick="handleSelection(${val}, '${q.id}')" class="option-btn bg-cream border-2 border-ink rounded-2xl p-6 text-left group hover:bg-coral transition-colors flex items-start gap-4">
            <span class="text-3xl">${opt.icon}</span>
            <div>
              <div class="font-bold text-xl group-hover:text-cream transition-colors">${opt.label}</div>
              ${opt.desc ? `<div class="text-sm font-medium text-ink/60 group-hover:text-cream/90 uppercase tracking-widest mt-1">${opt.desc}</div>` : ''}
            </div>
          </button>
        `;
      });

      html += `</div>`;
      container.innerHTML = html;
    }

    // 3. Handle when a user clicks a button
    function handleSelection(value, questionId) {
      userAnswers[questionId] = value;
      
      currentStep++;

      if (currentStep < questions.length) {
        renderQuestion();
      } else {
        showLoadingState();
      }
    }

    // 4. Loading State before showing gifts
    function showLoadingState() {
      progressText.innerText = "Curating...";
      container.innerHTML = `
        <div class="flex flex-col items-center justify-center fade-in-up text-center">
          <div class="text-6xl mb-6 animate-spin">✦</div>
          <h1 class="font-serif text-4xl font-bold mb-2">Searching the Indie Database</h1>
          <p class="font-sans font-bold text-ink/60 uppercase tracking-widest">Matching their vibe...</p>
        </div>
      `;
      setTimeout(fetchAndDisplayGifts, 1500);
    }

    // 5. Fetch Database and Show Results
    async function fetchAndDisplayGifts() {
      try {
        const response = await fetch('brands.json');
        const allBrands = await response.json();

        // Filter based on the vibe they selected in Question 2
        const selectedVibe = userAnswers['vibe'];
        
        let matchedGifts = allBrands.filter(g => {
          const cat = g.category.toLowerCase();
          if (selectedVibe === 'flower') return cat.includes("flower");
          if (selectedVibe === 'art') return cat.includes("art");
          if (selectedVibe === 'vinyl') return cat.includes("vinyl");
          if (selectedVibe === 'game') return cat.includes("game");
          if (selectedVibe === 'plush') return cat.includes("plush");
          return false;
        });

        // Fallback just in case
        if (matchedGifts.length === 0) matchedGifts = allBrands;

        // Shuffle and pick top 3
        const selectedGifts = matchedGifts.sort(() => 0.5 - Math.random()).slice(0, 3);

        progressText.innerText = "Your Results";
        
        // Build the Results UI
        let resultsHtml = `
          <div class="fade-in-up mb-8 text-center">
            <h2 class="font-serif text-4xl font-bold mb-2">Here is what they will love.</h2>
            <p class="font-sans font-bold text-ink/60 uppercase tracking-widest">Handpicked from Indian Indie Brands</p>
          </div>
          <div class="grid grid-cols-1 gap-6">
        `;

        selectedGifts.forEach((g, i) => {
          resultsHtml += `
            <div class="bg-lavender border-2 border-ink rounded-2xl p-6 option-btn fade-in-up delay-${i+1} cursor-pointer flex flex-col justify-between" onclick="window.open('${g.url}', '_blank')">
              <div>
                <p class="font-sans font-bold text-darkGreen uppercase tracking-widest text-xs mb-2">${g.category}</p>
                <h3 class="font-serif font-bold text-3xl mb-1">${g.name}</h3>
                <p class="font-sans font-bold text-ink/80 uppercase tracking-widest text-sm mb-4">${g.item}</p>
                <p class="font-serif italic text-lg leading-relaxed mb-6">"${g.why}"</p>
              </div>
              <div class="flex justify-between items-end border-t border-ink/20 pt-4">
                <div>
                  <p class="text-xs font-bold uppercase tracking-widest text-ink/60">Estimated</p>
                  <span class="font-bold text-xl">${g.price}</span>
                </div>
                <button class="bg-darkGreen text-cream px-6 py-3 rounded-full text-sm font-bold uppercase tracking-wider hover:bg-ink transition-colors">Buy Gift →</button>
              </div>
            </div>`;
        });

        resultsHtml += `
          </div>
          <button onclick="location.reload()" class="mt-8 mx-auto block font-bold uppercase tracking-widest text-sm text-ink/60 hover:text-coral transition-colors">Start Over</button>
        `;

        container.innerHTML = resultsHtml;

      } catch (error) {
        console.error("Database error:", error);
        container.innerHTML = `<h1 class="font-serif text-3xl font-bold text-center text-coral">Oops! Couldn't load the brands. Check if brands.json is correct!</h1>`;
      }
    }

    // Start the app
    renderQuestion();
  </script>
</body>
</html>
