<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftSense | Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkGreen: "#055047", ink: "#1a1a1a", cream: "#ffffeb",
            lavender: "#efd5ff", orange: "#ffa847", coral: "#ff6b4c"
          },
          fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"DM Sans"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #ffffeb; color: #1a1a1a; font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }
    .chat-bubble { max-width: 80%; padding: 16px 20px; border-radius: 20px; margin-bottom: 24px; animation: fadeIn 0.4s ease forwards; opacity: 0; transform: translateY(10px); }
    .bubble-ai { background-color: #055047; color: #ffffeb; border-top-left-radius: 4px; align-self: flex-start; }
    .bubble-user { background-color: #ffa847; color: #1a1a1a; border-top-right-radius: 4px; align-self: flex-end; font-weight: 500; }
    .gift-card { background: #efd5ff; border: 2px solid #1a1a1a; border-radius: 20px; padding: 24px; margin-bottom: 16px; animation: fadeIn 0.5s ease forwards; opacity: 0; box-shadow: 4px 4px 0px #1a1a1a; transition: transform 0.2s; }
    .gift-card:hover { transform: translateY(-4px); }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex flex-col">

  <header class="flex justify-between items-center p-6 border-b border-ink/10 bg-cream z-10">
    <a href="index.html" class="font-serif font-bold text-2xl lowercase hover:text-coral transition-colors">giftsense ✦</a>
    <div id="progress" class="text-sm font-bold uppercase tracking-widest text-darkGreen">Question 1 of 5</div>
  </header>

  <div id="chat-history" class="flex-1 overflow-y-auto p-6 pb-32 flex flex-col scroll-smooth">
    <div class="chat-bubble bubble-ai">
      Who are we finding a gift for today? Tell me a little bit about them.
    </div>
  </div>

  <div id="input-area" class="fixed bottom-0 left-0 w-full bg-cream p-6 border-t border-ink/10">
    <div class="max-w-3xl mx-auto relative flex items-center">
      <input type="text" id="user-input" placeholder="Type your answer..." onkeypress="if(event.key === 'Enter') sendMessage()" class="w-full bg-cream border-2 border-ink rounded-full py-4 pl-6 pr-16 outline-none focus:border-coral transition-colors text-ink placeholder-ink/50 font-medium">
      <button onclick="sendMessage()" class="absolute right-2 p-3 bg-coral text-ink border-2 border-ink rounded-full hover:bg-orange transition-colors">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script>
    let step = 1;
    const history = document.getElementById('chat-history');
    const input = document.getElementById('user-input');

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      // Add user message
      history.innerHTML += `<div class="chat-bubble bubble-user">${text}</div>`;
      input.value = '';
      history.scrollTop = history.scrollHeight;

      // Mock AI AI Response
      setTimeout(() => {
        if (step === 1) {
          history.innerHTML += `<div class="chat-bubble bubble-ai">I love that. Are they more of a "quiet Sunday reading a book" person, or a "let's go find a hidden cafe" person?</div>`;
          document.getElementById('progress').innerText = "Question 2 of 5";
          step++;
        } else if (step === 2) {
          history.innerHTML += `<div class="chat-bubble bubble-ai">Perfect. I have a great sense of their style. Give me one second while I look through the indie brand database...</div>`;
          document.getElementById('progress').innerText = "Curating Gifts...";
          document.getElementById('input-area').style.display = 'none'; // Hide input box
          setTimeout(showGifts, 1500);
        }
        history.scrollTop = history.scrollHeight;
      }, 800);
    }

    function async function showGifts() {
      try {
        // 1. Fetch your actual database!
        const response = await fetch('brands.json');
        const allBrands = await response.json();

        // 2. Shuffle and pick 2 random gifts to simulate the AI thinking
        const shuffled = allBrands.sort(() => 0.5 - Math.random());
        const selectedGifts = shuffled.slice(0, 2);

        // 3. Display them on the screen
        selectedGifts.forEach((g, i) => {
          setTimeout(() => {
            history.innerHTML += `
              <div class="gift-card cursor-pointer hover:shadow-lg" onclick="window.open('${g.url}', '_blank')">
                <p class="font-sans font-bold text-coral uppercase tracking-widest text-xs mb-1">${g.category}</p>
                <h3 class="font-serif font-bold text-2xl mb-1">${g.name}</h3>
                <p class="font-sans font-bold text-ink/80 uppercase tracking-widest text-xs mb-3">${g.item}</p>
                <p class="font-serif italic text-lg leading-relaxed mb-4">"${g.why}"</p>
                <div class="flex justify-between items-center border-t border-ink/20 pt-4 mt-2">
                  <span class="font-bold">${g.price}</span>
                  <button class="bg-darkGreen text-cream px-4 py-2 rounded-full text-sm font-bold uppercase tracking-wider hover:bg-ink transition-colors">See Gift →</button>
                </div>
              </div>`;
            history.scrollTop = history.scrollHeight;
          }, i * 300);
        });
      } catch (error) {
        console.error("Error loading gifts:", error);
        history.innerHTML += `<div class="chat-bubble bubble-ai">Oops! I had trouble looking into my database. Let's try again later.</div>`;
      }
    } {
      const gifts = [
        { brand: "Old Giraffe Studio", item: "Hand-illustrated Dated Planner", why: "Because they love organizing their thoughts and appreciate beautiful, handmade paper goods.", price: "₹850" },
        { brand: "Studio Kohl", item: "Contemporary Art Print", why: "For their aesthetic soul—this will look perfect in that quiet reading corner they love.", price: "₹1200" }
      ];

      gifts.forEach((g, i) => {
        setTimeout(() => {
          history.innerHTML += `
            <div class="gift-card">
              <h3 class="font-serif font-bold text-2xl mb-1">${g.brand}</h3>
              <p class="font-sans font-bold text-ink/80 uppercase tracking-widest text-xs mb-3">${g.item}</p>
              <p class="font-serif italic text-lg leading-relaxed mb-4">"${g.why}"</p>
              <div class="flex justify-between items-center border-t border-ink/20 pt-4">
                <span class="font-bold">${g.price}</span>
                <button class="bg-darkGreen text-cream px-4 py-2 rounded-full text-sm font-bold uppercase tracking-wider hover:bg-ink transition-colors">See Gift →</button>
              </div>
            </div>`;
          history.scrollTop = history.scrollHeight;
        }, i * 300);
      });
    }
  </script>
</body>
</html>
