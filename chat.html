<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftSense | Questionnaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkGreen: "#055047", ink: "#1a1a1a", cream: "#ffffeb",
            lavender: "#efd5ff", orange: "#ffa847", coral: "#ff6b4c"
          },
          fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"DM Sans"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    :root {
      --transition-duration: 0.2s;
      --box-shadow-sm: 2px 2px 0px #1a1a1a;
      --box-shadow-md: 4px 4px 0px #1a1a1a;
      --box-shadow-lg: 6px 6px 0px #1a1a1a;
    }
    body { background-color: #ffffeb; color: #1a1a1a; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    
    .option-btn { transition: all var(--transition-duration) ease; box-shadow: var(--box-shadow-md); }
    .option-btn:hover { transform: translate(-2px, -2px); box-shadow: var(--box-shadow-lg); }
    .option-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #1a1a1a; }
    .multi-selected { background-color: #ffa847 !important; color: #1a1a1a !important; border-color: #1a1a1a !important; transform: translate(2px, 2px); box-shadow: 0px 0px 0px #1a1a1a !important; }
    
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    
    /* Accessibility: Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="flex flex-col min-h-screen pb-24 relative">

  <div id="error-toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-coral text-cream px-6 py-3 rounded-full font-bold shadow-lg z-50 transition-opacity duration-300 opacity-0 pointer-events-none hidden">
    Error Message
  </div>

  <header class="flex justify-between items-center p-6 border-b border-ink/10 bg-cream z-10 sticky top-0">
    <a href="index.html" class="font-serif font-bold text-2xl lowercase hover:text-coral transition-colors">giftsense ✦</a>
    <div class="flex items-center gap-4">
      <button id="header-back-btn" onclick="QuizEngine.goToPreviousStep()" class="hidden text-sm font-bold uppercase tracking-widest text-ink/60 hover:text-ink transition-colors">← Back</button>
      <div id="progress-text" class="text-sm font-bold uppercase tracking-widest text-darkGreen">Step 1</div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center max-w-4xl mx-auto w-full p-6" id="quiz-container"></main>

  <div id="action-bar" class="fixed bottom-0 left-0 w-full bg-cream border-t border-ink/20 p-4 hidden justify-center gap-4 z-20">
    <button id="skip-btn" onclick="QuizEngine.goToNextStep()" class="hidden px-6 py-3 rounded-full text-sm font-bold uppercase tracking-wider text-ink/60 hover:text-ink transition-colors">Skip</button>
    <button id="continue-btn" onclick="QuizEngine.goToNextStep()" disabled class="bg-ink text-cream px-8 py-3 rounded-full text-sm font-bold uppercase tracking-wider disabled:opacity-50 disabled:cursor-not-allowed hover:bg-darkGreen transition-colors shadow-[4px_4px_0px_#ffa847]">Continue →</button>
  </div>

  <script>
    // ==========================================
    // MODULE 1: Error Handler
    // ==========================================
    const ErrorHandler = {
      display(message, duration = 4000) {
        const toast = document.getElementById('error-toast');
        toast.innerText = message;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.remove('opacity-0'), 10);
        
        setTimeout(() => {
          toast.classList.add('opacity-0');
          setTimeout(() => toast.classList.add('hidden'), 300);
        }, duration);
      },
      log(message, level = 'error') {
        console[level](`[GiftSense ${level.toUpperCase()}]: ${message}`);
      }
    };

    // ==========================================
    // MODULE 2: Question Bank (YOUR VISUAL UI)
    // ==========================================
    const QuestionBank = {
      questions: [
        {
          id: "occasion", type: "single", title: "What's the occasion?", subtitle: "Select one",
          options: ["Valentine's Day", "Birthday", "Anniversary", "Wedding", "Housewarming", "New Job", "Festival", "Secret Santa", "Farewell", "New Born", "Just because", "Other"]
        },
        {
          id: "receiver", type: "single", title: "Who's the lucky receiver?", subtitle: "Tell me about them",
          options: ["Partner", "Friend", "Sibling", "Parent", "Grandparent", "Son/Daughter", "Niece/Nephew", "Colleague", "Boss/Mentor", "Couple", "Myself", "Other"]
        },
        {
          id: "age", type: "single", title: "Age group", subtitle: "Select one",
          options: ["Teens (13–19)", "20s", "30s", "40s", "50s", "60+"]
        },
        {
          id: "gender", type: "single", title: "Gender", subtitle: "Select one",
          options: ["Woman", "Man", "Non-binary"]
        },
        {
          id: "interests", type: "multi", minSelect: 1, title: "What are they into?", subtitle: "Select one or more", gridClass: "grid-cols-2 lg:grid-cols-3",
          options: [
              { name: "Flowers & Botanicals", icon: `<img src="1-removebg-preview.png" alt="Flowers" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` },
              { name: "Collectible Plush", icon: `<img src="2-removebg-preview.png" alt="Plush" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` },
              { name: "Board Games", icon: `<img src="3-removebg-preview (1).png" alt="Games" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` },
              { name: "Art Prints & Posters", icon: `<img src="4-removebg-preview.png" alt="Art" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` },
              { name: "Vinyl Records", icon: `<img src="3-removebg-preview.png" alt="Vinyl" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` }
          ]
        },
        {
          id: "budget", type: "multi", minSelect: 1, title: "What's your budget?", subtitle: "Select one or more",
          options: ["Under ₹500", "₹500 – ₹1,000", "₹1,000 – ₹2,000", "₹2,000 – ₹3,000", "₹3,000 – ₹5,000", "₹5,000 – ₹10,000", "₹10,000+"]
        },
        {
          id: "avoid", type: "multi", minSelect: 0, title: "Anything to avoid?", subtitle: "Optional — skip if nothing comes to mind",
          options: ["No candles", "Kills plants", "Doesn't drink", "Doesn't smoke", "No sweets", "No fragrance", "Picky about fashion", "Has skincare routine", "Other"]
        }
      ]
    };

    // ==========================================
    // MODULE 3: Advanced Scoring Engine V2 (THE NEW BRAIN)
    // ==========================================
    const GiftScoringEngine = {
      vibeKeywords: {
        'Practical & Useful': ['kit', 'set', 'everyday', 'tool', 'organize', 'desk', 'bag', 'useful', 'record', 'turntable'],
        'Sentimental & Sweet': ['memory', 'custom', 'keepsake', 'photo', 'love', 'frame', 'art', 'heart', 'hug', 'plush'],
        'Quirky & Fun': ['fun', 'game', 'unique', 'puzzle', 'color', 'play', 'quirky', 'weird', 'blind box', 'monster'],
        'Luxury & Pampering': ['premium', 'spa', 'silk', 'relax', 'candle', 'luxury', 'treat', 'gold', 'botanical', 'designer']
      },

      calculateScore(gift, userProfile, seenGifts) {
        let score = 0;
        const text = `${gift.category} ${gift.item} ${gift.why}`.toLowerCase();
        const cat = gift.category.toLowerCase();

        // Factor 1: Category & Interest Alignment
        const interests = userProfile.interests || [];
        if (interests.includes("Flowers & Botanicals") && (cat.includes("flower") || text.includes("plant"))) score += 30;
        if (interests.includes("Art Prints & Posters") && (cat.includes("art") || text.includes("print"))) score += 30;
        if (interests.includes("Vinyl Records") && (cat.includes("vinyl") || text.includes("record"))) score += 30;
        if (interests.includes("Board Games") && (cat.includes("game") || text.includes("play"))) score += 30;
        if (interests.includes("Collectible Plush") && (cat.includes("plush") || text.includes("toy"))) score += 30;

        // Factor 2: Occasion & Receiver Synergy
        const occasion = userProfile.occasion || "";
        const receiver = userProfile.receiver || "";
        const age = userProfile.age || "";

        if ((occasion === "Valentine's Day" || occasion === "Anniversary" || receiver === "Partner") || receiver === "Couple") {
            if (cat.includes("flower") || text.includes("custom") || text.includes("luxury")) score += 20;
            if (cat.includes("game") && text.includes("party")) score -= 10; 
        }

        if (occasion === "Housewarming" || occasion === "Secret Santa" || receiver === "Friend" || receiver === "Colleague") {
            if (cat.includes("game") || cat.includes("art") || text.includes("quirky")) score += 20;
        }

        if (age === "Teens (13–19)" || age === "20s") {
            if (cat.includes("plush") || text.includes("gen z") || cat.includes("poster") || text.includes("anime")) score += 15;
        }
        if (age === "50s" || age === "60+") {
            if (cat.includes("flower") || cat.includes("record") || text.includes("classic")) score += 15;
            if (cat.includes("plush") && !text.includes("timeless")) score -= 15; 
        }

        // Factor 3: Budget Match
        const minPriceMatch = gift.price.replace(/,/g, '').match(/\d+/);
        const minPrice = minPriceMatch ? parseInt(minPriceMatch[0]) : 0;
        const budgets = userProfile.budget || [];
        let isBudgetMatch = false;
        
        if (budgets.includes("Under ₹500") && minPrice <= 500) isBudgetMatch = true;
        if (budgets.includes("₹500 – ₹1,000") && minPrice >= 400 && minPrice <= 1000) isBudgetMatch = true;
        if (budgets.includes("₹1,000 – ₹2,000") && minPrice >= 900 && minPrice <= 2000) isBudgetMatch = true;
        if (budgets.includes("₹2,000 – ₹3,000") && minPrice >= 1900 && minPrice <= 3000) isBudgetMatch = true;
        if (budgets.includes("₹3,000 – ₹5,000") && minPrice >= 2900 && minPrice <= 5000) isBudgetMatch = true;
        if (budgets.includes("₹5,000 – ₹10,000") && minPrice >= 4900 && minPrice <= 10000) isBudgetMatch = true;
        if (budgets.includes("₹10,000+") && minPrice >= 9000) isBudgetMatch = true;
        
        if (isBudgetMatch) {
            score += 20;
        } else {
            score -= 30; // HARD PENALTY
        }

        // Factor 4: Vibe Boost
        if (userProfile.vibe) {
          const keywords = this.vibeKeywords[userProfile.vibe] || [];
          const matchesVibe = keywords.some(kw => text.includes(kw));
          if (matchesVibe) score += 15;
        }

        // Factor 5: Avoidance Penalties
        const avoidances = userProfile.avoid || [];
        if (avoidances.includes("No candles") && text.includes("candle")) score -= 50;
        if (avoidances.includes("Kills plants") && (text.includes("plant") || text.includes("botanical"))) score -= 50;
        if (avoidances.includes("Doesn't drink") && (text.includes("wine") || text.includes("alcohol"))) score -= 50;
        if (avoidances.includes("No sweets") && (text.includes("chocolate") || text.includes("sweet"))) score -= 50;

        // Factor 6: Repetition Decay
        if (seenGifts.includes(gift.name)) {
          score = score * 0.1; 
        }

        return Math.round(Math.max(score, 0));
      }
    };

    // ==========================================
    // MODULE 4: Main Application Engine
    // ==========================================
    const QuizEngine = {
      currentStep: 0,
      userAnswers: {},
      currentMultiSelection: [],
      seenGifts: [],
      giftOffset: 0,
      totalMatchedGifts: 0,
      brandsCache: null, 
      
      container: document.getElementById('quiz-container'),
      progressText: document.getElementById('progress-text'),
      actionBar: document.getElementById('action-bar'),
      continueBtn: document.getElementById('continue-btn'),
      skipBtn: document.getElementById('skip-btn'),
      backBtn: document.getElementById('header-back-btn'),

      init() {
        this.renderQuestion();
      },

      renderQuestion() {
        try {
          this.container.innerHTML = '';
          const q = QuestionBank.questions[this.currentStep];
          
          if (!q) throw new Error("Question index out of bounds");
          
          if (q.type === 'multi') {
            this.currentMultiSelection = this.userAnswers[q.id] ? [...this.userAnswers[q.id]] : [];
          }

          this.backBtn.style.display = this.currentStep > 0 ? 'block' : 'none';
          this.progressText.innerText = `Step ${this.currentStep + 1} of ${QuestionBank.questions.length}`;

          if (q.type === 'multi') {
            this.actionBar.style.display = 'flex';
            this.continueBtn.disabled = q.minSelect > 0 && this.currentMultiSelection.length < q.minSelect;
            this.continueBtn.innerText = this.currentMultiSelection.length >= q.minSelect ? "Continue →" : `Select ${q.minSelect - this.currentMultiSelection.length} more`;
            
            if (q.minSelect === 0 && this.currentMultiSelection.length === 0) {
               this.skipBtn.style.display = 'block';
               this.continueBtn.style.display = 'none';
            } else {
               this.skipBtn.style.display = 'none';
               this.continueBtn.style.display = 'block';
            }
          } else {
            this.actionBar.style.display = 'none';
          }

          let html = `<div class="text-center fade-in-up w-full">
              <h1 class="font-serif text-4xl md:text-5xl font-bold mb-2 text-ink leading-tight">${q.title}</h1>
              ${q.subtitle ? `<p class="font-sans font-bold text-ink/60 uppercase tracking-widest text-sm mb-8">${q.subtitle}</p>` : '<div class="mb-8"></div>'}
            </div>
            <div class="w-full grid gap-4 fade-in-up ${q.gridClass || 'grid-cols-2 md:grid-cols-3'}">`;

          q.options.forEach((opt) => {
            const isInterests = q.id === "interests";
            const label = isInterests ? opt.name : opt;
            const icon = isInterests ? opt.icon : "";
            const layoutClass = isInterests ? "flex-col p-4 group" : "p-4";

            let isSelected = false;
            if (q.type === 'single') isSelected = this.userAnswers[q.id] === label;
            else isSelected = this.currentMultiSelection.includes(label);
            
            const activeClass = isSelected ? 'multi-selected' : '';

            if (q.type === 'single') {
              html += `<button onclick="QuizEngine.handleSingleSelect('${label}', '${q.id}')" class="option-btn bg-cream border-2 border-ink rounded-xl font-bold text-lg text-center flex items-center justify-center hover:bg-lavender ${layoutClass} ${activeClass}">${icon}<span>${label}</span></button>`;
            } else {
              html += `<button onclick="QuizEngine.toggleMultiSelect('${label}', this)" class="option-btn bg-cream border-2 border-ink rounded-xl font-bold text-base md:text-lg text-center flex items-center justify-center hover:bg-lavender ${layoutClass} ${activeClass}">${icon}<span>${label}</span></button>`;
            }
          });

          html += `</div>`;
          this.container.innerHTML = html;
          window.scrollTo(0,0);
        } catch (error) {
          ErrorHandler.log(error.message);
          ErrorHandler.display("Sorry, we encountered an issue loading this question.");
        }
      },

      handleSingleSelect(value, questionId) {
        this.userAnswers[questionId] = value;
        this.goToNextStep();
      },

      toggleMultiSelect(value, btnElement) {
        const q = QuestionBank.questions[this.currentStep];
        
        if (this.currentMultiSelection.includes(value)) {
          this.currentMultiSelection = this.currentMultiSelection.filter(item => item !== value);
          btnElement.classList.remove('multi-selected');
        } else {
          this.currentMultiSelection.push(value);
          btnElement.classList.add('multi-selected');
        }

        if (this.currentMultiSelection.length >= q.minSelect) {
          this.continueBtn.disabled = false;
          this.continueBtn.innerText = "Continue →";
          this.continueBtn.style.display = 'block';
          if (q.minSelect === 0) this.skipBtn.style.display = 'none'; 
        } else {
          this.continueBtn.disabled = true;
          this.continueBtn.innerText = `Select ${q.minSelect - this.currentMultiSelection.length} more`;
          if (q.minSelect === 0 && this.currentMultiSelection.length === 0) {
             this.skipBtn.style.display = 'block';
             this.continueBtn.style.display = 'none';
          }
        }
      },

      goToNextStep() {
        if (QuestionBank.questions[this.currentStep].type === 'multi') {
            this.userAnswers[QuestionBank.questions[this.currentStep].id] = [...this.currentMultiSelection];
        }
        this.currentStep++;
        
        if (this.currentStep < QuestionBank.questions.length) {
          this.renderQuestion();
        } else { 
          this.actionBar.style.display = 'none'; 
          this.backBtn.style.display = 'none';
          this.showLoadingState(); 
        }
      },

      goToPreviousStep() {
        if (this.currentStep > 0) {
          this.currentStep--;
          this.renderQuestion();
        }
      },

      showLoadingState() {
        this.progressText.innerText = "Curating...";
        this.container.innerHTML = `<div class="flex flex-col items-center justify-center fade-in-up text-center mt-20">
            <div class="text-6xl mb-6 animate-spin">✦</div>
            <h1 class="font-serif text-4xl font-bold mb-2">Analyzing Profile</h1>
            <p class="font-sans font-bold text-ink/60 uppercase tracking-widest">Running smart algorithm...</p>
          </div>`;
        
        setTimeout(() => this.fetchAndDisplayGifts(), 1500);
      },

      async fetchAndDisplayGifts() {
        try {
          if (!this.brandsCache) {
            const url = 'brands.json?t=' + new Date().getTime();
            const response = await fetch(url);
            if (!response.ok) throw new Error("Failed to load gift database");
            this.brandsCache = await response.json();
          }

          let scoredGifts = this.brandsCache.map(gift => ({
            ...gift,
            score: GiftScoringEngine.calculateScore(gift, this.userAnswers, this.seenGifts)
          }));

          let matchedGifts = scoredGifts.filter(g => g.score >= 15).sort((a, b) => b.score - a.score);
          this.totalMatchedGifts = matchedGifts.length;
          
          const selectedGifts = matchedGifts.slice(this.giftOffset, this.giftOffset + 3);

          selectedGifts.forEach(g => {
            if (!this.seenGifts.includes(g.name)) this.seenGifts.push(g.name);
          });

          this.progressText.innerText = "Your Results";
          this.renderResultsUI(selectedGifts);

        } catch (error) {
          ErrorHandler.log(error.message);
          ErrorHandler.display("Unable to load matches. Please check your connection.");
          this.container.innerHTML = `
            <div class="text-center mt-20">
              <h1 class="font-serif text-3xl font-bold mb-4">Something went wrong</h1>
              <button onclick="QuizEngine.fetchAndDisplayGifts()" class="option-btn px-6 py-3 bg-darkGreen text-cream rounded-xl font-bold">Try Again</button>
            </div>
          `;
        }
      },

      renderResultsUI(selectedGifts) {
        let resultsHtml = `<div class="fade-in-up mb-8 text-center w-full"><h2 class="font-serif text-4xl font-bold mb-2">The Perfect Matches</h2></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">`;

        if (selectedGifts.length === 0) {
          if (this.giftOffset === 0) {
            resultsHtml += `<p class="col-span-3 text-center font-bold text-ink/60 p-10">No strong matches found for this exact profile. Try adjusting your preferences!</p>`;
          } else {
            resultsHtml += `<p class="col-span-3 text-center font-bold text-ink/60 p-10">You've seen all our best matches! Try "Digging deeper" to shift the vibe.</p>`;
          }
        } else {
          selectedGifts.forEach(g => {
            const matchText = g.score >= 40 ? "Top Match" : "Good Match";
            resultsHtml += `<div class="bg-lavender border-2 border-ink rounded-2xl p-6 option-btn fade-in-up relative cursor-pointer flex flex-col justify-between" onclick="window.open('${g.url}', '_blank')">
                <div class="absolute top-0 right-0 bg-coral text-cream text-[10px] font-bold uppercase px-3 py-1 rounded-bl-xl">${matchText}</div>
                <div class="mt-2">
                  <p class="font-sans font-bold text-darkGreen uppercase tracking-widest text-xs mb-2">${g.category}</p>
                  <h3 class="font-serif font-bold text-2xl mb-1">${g.name}</h3>
                  <p class="font-sans font-bold text-ink/80 text-sm mb-4">${g.item}</p>
                  <p class="font-serif italic text-base leading-relaxed mb-6">"${g.why}"</p>
                </div>
                <div class="border-t border-ink/20 pt-4 mt-auto">
                  <span class="font-bold text-lg">${g.price}</span>
                  <button class="w-full mt-4 bg-darkGreen text-cream py-3 rounded-full text-sm font-bold uppercase hover:bg-ink transition-colors">See Gift</button>
                </div>
              </div>`;
          });
        }
        
        resultsHtml += `</div>`;
        
        resultsHtml += `
        <div id="followup-actions" class="mt-20 text-center w-full fade-in-up">
          <h3 class="text-3xl font-serif text-ink mb-8 font-bold">Not quite right?</h3>
          <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full max-w-2xl mx-auto">`;
            
        if (this.giftOffset + 3 < this.totalMatchedGifts) {
          resultsHtml += `<button onclick="QuizEngine.handleShowMore()" class="option-btn px-6 py-3 bg-cream border-2 border-ink text-ink font-sans font-bold rounded-xl hover:bg-lavender w-full sm:w-auto">Show more options</button>`;
        }

        resultsHtml += `
            <button onclick="QuizEngine.handleDigDeeper()" class="option-btn px-6 py-3 bg-cream border-2 border-ink text-ink font-sans font-bold rounded-xl hover:bg-orange w-full sm:w-auto">Dig deeper</button>
            <button onclick="QuizEngine.handleRestart()" class="option-btn px-6 py-3 bg-darkGreen border-2 border-ink text-cream font-sans font-bold rounded-xl hover:bg-ink w-full sm:w-auto">Gift someone else</button>
          </div>
        </div>`;
        
        this.container.innerHTML = resultsHtml;
        window.scrollTo(0,0);
      },

      handleShowMore() {
        this.giftOffset += 3; 
        this.showLoadingState();
        window.scrollTo(0, 0);
      },

      handleDigDeeper() {
        this.progressText.innerText = "Digging Deeper";
        this.container.innerHTML = `
          <div class="text-center fade-in-up w-full max-w-2xl mx-auto mt-10">
            <h1 class="font-serif text-4xl md:text-5xl font-bold mb-4 text-ink leading-tight">Let's refine this 🕵️‍♀️</h1>
            <p class="font-sans font-bold text-ink/60 uppercase tracking-widest text-sm mb-10">What is their primary vibe?</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
              <button onclick="QuizEngine.submitDigDeeper('Practical & Useful')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Practical & Useful</button>
              <button onclick="QuizEngine.submitDigDeeper('Sentimental & Sweet')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Sentimental & Sweet</button>
              <button onclick="QuizEngine.submitDigDeeper('Quirky & Fun')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Quirky & Fun</button>
              <button onclick="QuizEngine.submitDigDeeper('Luxury & Pampering')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Luxury & Pampering</button>
            </div>
            
            <button onclick="QuizEngine.showLoadingState()" class="mt-12 font-bold text-sm uppercase tracking-widest opacity-60 hover:opacity-100 hover:text-coral transition-all">← Cancel & Go Back</button>
          </div>
        `;
        window.scrollTo(0, 0);
      },

      submitDigDeeper(vibe) {
        this.userAnswers['vibe'] = vibe; 
        this.giftOffset = 0; 
        this.showLoadingState(); 
      },

      handleRestart() {
        window.location.reload(); 
      }
    };

    QuizEngine.init();
  </script>
</body>
</html>
