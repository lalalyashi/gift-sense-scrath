<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftSense | Questionnaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkGreen: "#055047", ink: "#1a1a1a", cream: "#ffffeb",
            lavender: "#efd5ff", orange: "#ffa847", coral: "#ff6b4c"
          },
          fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['"DM Sans"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #ffffeb; color: #1a1a1a; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    .option-btn { transition: all 0.2s ease; box-shadow: 4px 4px 0px #1a1a1a; }
    .option-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #1a1a1a; }
    .option-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #1a1a1a; }
    .multi-selected { background-color: #ffa847 !important; color: #1a1a1a !important; border-color: #1a1a1a !important; transform: translate(2px, 2px); box-shadow: 0px 0px 0px #1a1a1a !important; }
    
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex flex-col min-h-screen pb-24">

  <header class="flex justify-between items-center p-6 border-b border-ink/10 bg-cream z-10 sticky top-0">
    <a href="index.html" class="font-serif font-bold text-2xl lowercase hover:text-coral transition-colors">giftsense ✦</a>
    <div id="progress-text" class="text-sm font-bold uppercase tracking-widest text-darkGreen">Step 1</div>
  </header>

  <main class="flex-1 flex flex-col items-center max-w-4xl mx-auto w-full p-6" id="quiz-container"></main>

  <div id="action-bar" class="fixed bottom-0 left-0 w-full bg-cream border-t border-ink/20 p-4 hidden justify-center gap-4 z-20">
    <button id="skip-btn" onclick="goToNextStep()" class="hidden px-6 py-3 rounded-full text-sm font-bold uppercase tracking-wider text-ink/60 hover:text-ink transition-colors">Skip</button>
    <button id="continue-btn" onclick="goToNextStep()" disabled class="bg-ink text-cream px-8 py-3 rounded-full text-sm font-bold uppercase tracking-wider disabled:opacity-50 disabled:cursor-not-allowed hover:bg-darkGreen transition-colors shadow-[4px_4px_0px_#ffa847]">Continue →</button>
  </div>

  <script>
    const questions = [
      {
        id: "occasion", type: "single", title: "What's the occasion?", subtitle: "Select one",
        options: ["Valentine's Day", "Birthday", "Anniversary", "Wedding", "Housewarming", "New Job", "Festival", "Secret Santa", "Farewell", "New Born", "Just because", "Other"]
      },
      {
        id: "receiver", type: "single", title: "Who's the lucky receiver?", subtitle: "Tell me about them",
        options: ["Partner", "Friend", "Sibling", "Parent", "Grandparent", "Son/Daughter", "Niece/Nephew", "Colleague", "Boss/Mentor", "Couple", "Myself", "Other"]
      },
      {
        id: "age", type: "single", title: "Age group", subtitle: "Select one",
        options: ["Teens (13–19)", "20s", "30s", "40s", "50s", "60+"]
      },
      {
        id: "gender", type: "single", title: "Gender", subtitle: "Select one",
        options: ["Woman", "Man", "Non-binary"]
      },
      {
        id: "interests", type: "multi", minSelect: 1, title: "What are they into?", subtitle: "Select one or more", gridClass: "grid-cols-2 lg:grid-cols-3",
        options: [
            { 
              name: "Flowers & Botanicals", 
              icon: `<img src="1-removebg-preview.png" alt="Flowers & Botanicals" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` 
            },
            { 
              name: "Collectible Plush", 
              icon: `<img src="2-removebg-preview.png" alt="Collectible Plush" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` 
            },
            { 
              name: "Board Games", 
              icon: `<img src="3-removebg-preview (1).png" alt="Board Games" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` 
            },
            { 
              name: "Art Prints & Posters", 
              icon: `<img src="4-removebg-preview.png" alt="Art Prints & Posters" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` 
            },
            { 
              name: "Vinyl Records", 
              icon: `<img src="3-removebg-preview.png" alt="Vinyl Records" class="w-full h-24 md:h-32 object-contain transition-transform duration-300 group-hover:scale-110 mb-3" />` 
            }
        ]
      },
      {
        id: "budget", type: "multi", minSelect: 1, title: "What's your budget?", subtitle: "Select one or more",
        options: ["Under ₹500", "₹500 – ₹1,000", "₹1,000 – ₹2,000", "₹2,000 – ₹3,000", "₹3,000 – ₹5,000", "₹5,000 – ₹10,000", "₹10,000+"]
      },
      {
        id: "avoid", type: "multi", minSelect: 0, title: "Anything to avoid?", subtitle: "Optional — skip if nothing comes to mind",
        options: ["No candles", "Kills plants", "Doesn't drink", "Doesn't smoke", "No sweets", "No fragrance", "Picky about fashion", "Has skincare routine", "Other"]
      }
    ];

    let currentStep = 0;
    let userAnswers = {}; 
    let currentMultiSelection = []; 
    
    // ADVANCED ADDITION: Tracks how many gifts we've shown so we can page through them!
    let giftOffset = 0; 
    let totalMatchedGifts = 0;
    let seenGifts = []; // <-- Added to track gifts we've already shown

    const container = document.getElementById('quiz-container');
    const progressText = document.getElementById('progress-text');
    const actionBar = document.getElementById('action-bar');
    const continueBtn = document.getElementById('continue-btn');
    const skipBtn = document.getElementById('skip-btn');

    function renderQuestion() {
      container.innerHTML = '';
      currentMultiSelection = []; 
      const q = questions[currentStep];
      progressText.innerText = `Step ${currentStep + 1} of ${questions.length}`;

      if (q.type === 'multi') {
        actionBar.style.display = 'flex';
        continueBtn.disabled = q.minSelect > 0;
        continueBtn.innerText = q.minSelect > 0 ? `Select ${q.minSelect} to Continue` : "Continue →";
        q.minSelect === 0 ? (skipBtn.style.display = 'block', continueBtn.style.display = 'none') : (skipBtn.style.display = 'none', continueBtn.style.display = 'block');
      } else {
        actionBar.style.display = 'none';
      }

      let html = `<div class="text-center fade-in-up w-full">
          <h1 class="font-serif text-4xl md:text-5xl font-bold mb-2 text-ink leading-tight">${q.title}</h1>
          ${q.subtitle ? `<p class="font-sans font-bold text-ink/60 uppercase tracking-widest text-sm mb-8">${q.subtitle}</p>` : '<div class="mb-8"></div>'}
        </div>
        <div class="w-full grid gap-4 fade-in-up ${q.gridClass || 'grid-cols-2 md:grid-cols-3'}">`;

      q.options.forEach((opt) => {
        const isInterests = q.id === "interests";
        const label = isInterests ? opt.name : opt;
        const icon = isInterests ? opt.icon : "";
        
        const layoutClass = isInterests ? "flex-col p-4 group" : "p-4";

        if (q.type === 'single') {
          html += `<button onclick="handleSingleSelect('${label}', '${q.id}')" class="option-btn bg-cream border-2 border-ink rounded-xl font-bold text-lg text-center flex items-center justify-center hover:bg-lavender ${layoutClass}">${icon}<span>${label}</span></button>`;
        } else {
          html += `<button onclick="toggleMultiSelect('${label}', this)" class="option-btn bg-cream border-2 border-ink rounded-xl font-bold text-base md:text-lg text-center flex items-center justify-center hover:bg-lavender ${layoutClass}">${icon}<span>${label}</span></button>`;
        }
      });

      html += `</div>`;
      container.innerHTML = html;
      window.scrollTo(0,0);
    }

    function handleSingleSelect(value, questionId) {
      userAnswers[questionId] = value;
      advanceToNext();
    }

    function toggleMultiSelect(value, btnElement) {
      const q = questions[currentStep];
      if (currentMultiSelection.includes(value)) {
        currentMultiSelection = currentMultiSelection.filter(item => item !== value);
        btnElement.classList.remove('multi-selected');
      } else {
        currentMultiSelection.push(value);
        btnElement.classList.add('multi-selected');
      }

      if (currentMultiSelection.length >= q.minSelect) {
        continueBtn.disabled = false;
        continueBtn.innerText = "Continue →";
        continueBtn.style.display = 'block';
        if (q.minSelect === 0) skipBtn.style.display = 'none'; 
      } else {
        continueBtn.disabled = true;
        continueBtn.innerText = `Select ${q.minSelect - currentMultiSelection.length} more`;
        if (q.minSelect === 0 && currentMultiSelection.length === 0) {
           skipBtn.style.display = 'block';
           continueBtn.style.display = 'none';
        }
      }
    }

    function goToNextStep() {
      userAnswers[questions[currentStep].id] = [...currentMultiSelection];
      advanceToNext();
    }

    function advanceToNext() {
      currentStep++;
      if (currentStep < questions.length) renderQuestion();
      else { actionBar.style.display = 'none'; showLoadingState(); }
    }

    function showLoadingState() {
      progressText.innerText = "Curating...";
      container.innerHTML = `<div class="flex flex-col items-center justify-center fade-in-up text-center mt-20">
          <div class="text-6xl mb-6 animate-spin">✦</div>
          <h1 class="font-serif text-4xl font-bold mb-2">Analyzing Profile</h1>
          <p class="font-sans font-bold text-ink/60 uppercase tracking-widest">Running smart algorithm...</p>
        </div>`;
      setTimeout(fetchAndDisplayGifts, 2000);
    }

    async function fetchAndDisplayGifts() {
      try {
        const response = await fetch('brands.json');
        const allBrands = await response.json();
        const userInterests = userAnswers['interests'] || [];
        const userBudgets = userAnswers['budget'] || [];
        
        let scoredGifts = allBrands.map(g => {
          let score = 0;
          const cat = g.category.toLowerCase();
          const text = (g.item + " " + g.why).toLowerCase();

          // Base scoring
          if (userInterests.includes("Flowers & Botanicals") && cat.includes("flower")) score += 10;
          if (userInterests.includes("Art Prints & Posters") && cat.includes("art")) score += 10;
          if (userInterests.includes("Vinyl Records") && cat.includes("vinyl")) score += 10;
          if (userInterests.includes("Board Games") && cat.includes("game")) score += 10;
          if (userInterests.includes("Collectible Plush") && cat.includes("plush")) score += 10;

          // ADVANCED: Deep Dive Vibe Scoring!
          if (userAnswers['vibe']) {
            const vibe = userAnswers['vibe'];
            
            // 1. Give a MASSIVE +50 point boost to force new items to the top, and added more keywords!
            if (vibe === 'Practical & Useful' && (text.includes('kit') || text.includes('set') || text.includes('everyday') || text.includes('tool') || text.includes('organize') || text.includes('desk') || text.includes('bag'))) score += 50;
            if (vibe === 'Sentimental & Sweet' && (text.includes('memory') || text.includes('custom') || text.includes('keepsake') || text.includes('photo') || text.includes('love') || text.includes('frame') || text.includes('art'))) score += 50;
            if (vibe === 'Quirky & Fun' && (text.includes('fun') || text.includes('game') || text.includes('unique') || text.includes('puzzle') || text.includes('color') || text.includes('play') || text.includes('quirky'))) score += 50;
            if (vibe === 'Luxury & Pampering' && (text.includes('premium') || text.includes('spa') || text.includes('silk') || text.includes('relax') || text.includes('candle') || text.includes('luxury') || text.includes('treat'))) score += 50;
            
            // 2. Penalize the gifts we already showed them so they don't repeat!
            if (seenGifts.includes(g.name)) {
              score -= 20; 
            }
          }

          const minPriceMatch = g.price.replace(/,/g, '').match(/\d+/);
          const minPrice = minPriceMatch ? parseInt(minPriceMatch[0]) : 0;
          let budgetMatch = false;
          if (userBudgets.includes("Under ₹500") && minPrice <= 500) budgetMatch = true;
          if (userBudgets.includes("₹500 – ₹1,000") && minPrice >= 400 && minPrice <= 1000) budgetMatch = true;
          if (userBudgets.includes("₹1,000 – ₹2,000") && minPrice >= 900 && minPrice <= 2000) budgetMatch = true;
          if (userBudgets.includes("₹2,000 – ₹3,000") && minPrice >= 1900 && minPrice <= 3000) budgetMatch = true;
          if (userBudgets.includes("₹3,000 – ₹5,000") && minPrice >= 2900 && minPrice <= 5000) budgetMatch = true;
          if (userBudgets.includes("₹5,000 – ₹10,000") && minPrice >= 4900 && minPrice <= 10000) budgetMatch = true;
          if (userBudgets.includes("₹10,000+") && minPrice >= 9000) budgetMatch = true;
          
          if (budgetMatch) score += 5;
          return { ...g, score };
        });

        // Sort by score
        let matchedGifts = scoredGifts.filter(g => g.score >= 10).sort((a, b) => b.score - a.score);
        totalMatchedGifts = matchedGifts.length;
        
        // ADVANCED: Use the offset to slice the correct 3 gifts
        const selectedGifts = matchedGifts.slice(giftOffset, giftOffset + 3);

        // Remember these gifts so we can banish them if they click "Dig Deeper"
        selectedGifts.forEach(g => {
          if (!seenGifts.includes(g.name)) seenGifts.push(g.name);
        });

        progressText.innerText = "Your Results";
        
        let resultsHtml = `<div class="fade-in-up mb-8 text-center w-full"><h2 class="font-serif text-4xl font-bold mb-2">The Perfect Matches</h2></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">`;

        // Smart Empty States
        if (selectedGifts.length === 0) {
          if (giftOffset === 0) {
            resultsHtml += `<p class="col-span-3 text-center font-bold text-ink/60">No matches found for this exact budget. Try expanding your range!</p>`;
          } else {
            resultsHtml += `<p class="col-span-3 text-center font-bold text-ink/60">You've seen all our best matches! Try "Digging deeper" to shift the vibe.</p>`;
          }
        } else {
          selectedGifts.forEach(g => {
            const matchText = g.score >= 15 ? "Top Match" : "Good Match";
            resultsHtml += `<div class="bg-lavender border-2 border-ink rounded-2xl p-6 option-btn fade-in-up relative cursor-pointer flex flex-col justify-between" onclick="window.open('${g.url}', '_blank')">
                <div class="absolute top-0 right-0 bg-coral text-cream text-[10px] font-bold uppercase px-3 py-1 rounded-bl-xl">${matchText}</div>
                <div class="mt-2">
                  <p class="font-sans font-bold text-darkGreen uppercase tracking-widest text-xs mb-2">${g.category}</p>
                  <h3 class="font-serif font-bold text-2xl mb-1">${g.name}</h3>
                  <p class="font-sans font-bold text-ink/80 text-sm mb-4">${g.item}</p>
                  <p class="font-serif italic text-base leading-relaxed mb-6">"${g.why}"</p>
                </div>
                <div class="border-t border-ink/20 pt-4 mt-auto">
                  <span class="font-bold text-lg">${g.price}</span>
                  <button class="w-full mt-4 bg-darkGreen text-cream py-3 rounded-full text-sm font-bold uppercase hover:bg-ink transition-colors">See Gift</button>
                </div>
              </div>`;
          });
        }
        
        resultsHtml += `</div>`;
        
        // Follow Up Actions UI
        resultsHtml += `
        <div id="followup-actions" class="mt-20 text-center w-full fade-in-up">
          <h3 class="text-3xl font-serif text-ink mb-8 font-bold">Not quite right?</h3>
          
          <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full max-w-2xl mx-auto">`;
            
        // Hide "Show more" if we are out of gifts!
        if (giftOffset + 3 < totalMatchedGifts) {
          resultsHtml += `
            <button onclick="handleShowMore()" class="option-btn px-6 py-3 bg-cream border-2 border-ink text-ink font-sans font-bold rounded-xl hover:bg-lavender w-full sm:w-auto">
              Show more options
            </button>`;
        }

        resultsHtml += `
            <button onclick="handleDigDeeper()" class="option-btn px-6 py-3 bg-cream border-2 border-ink text-ink font-sans font-bold rounded-xl hover:bg-orange w-full sm:w-auto">
              Dig deeper
            </button>

            <button onclick="handleRestart()" class="option-btn px-6 py-3 bg-darkGreen border-2 border-ink text-cream font-sans font-bold rounded-xl hover:bg-ink w-full sm:w-auto">
              Gift someone else
            </button>
          </div>
        </div>`;
        
        container.innerHTML = resultsHtml;
        window.scrollTo(0,0);
      } catch (e) { console.error(e); }
    }

    // --- ADVANCED FOLLOW UP FUNCTIONS ---

    function handleShowMore() {
      // Increase the offset by 3 to skip the gifts we just saw
      giftOffset += 3; 
      showLoadingState();
      window.scrollTo(0, 0);
    }

    function handleDigDeeper() {
      // ADVANCED: Render a brand new UI step directly into the container!
      progressText.innerText = "Digging Deeper";
      container.innerHTML = `
        <div class="text-center fade-in-up w-full max-w-2xl mx-auto mt-10">
          <h1 class="font-serif text-4xl md:text-5xl font-bold mb-4 text-ink leading-tight">Let's refine this 🕵️‍♀️</h1>
          <p class="font-sans font-bold text-ink/60 uppercase tracking-widest text-sm mb-10">What is their primary vibe?</p>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <button onclick="submitDigDeeper('Practical & Useful')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Practical & Useful</button>
            <button onclick="submitDigDeeper('Sentimental & Sweet')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Sentimental & Sweet</button>
            <button onclick="submitDigDeeper('Quirky & Fun')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Quirky & Fun</button>
            <button onclick="submitDigDeeper('Luxury & Pampering')" class="option-btn bg-cream border-2 border-ink rounded-2xl font-bold text-xl p-8 text-center hover:bg-lavender">Luxury & Pampering</button>
          </div>
          
          <button onclick="showLoadingState()" class="mt-12 font-bold text-sm uppercase tracking-widest opacity-60 hover:opacity-100 hover:text-coral transition-all">← Cancel & Go Back</button>
        </div>
      `;
      window.scrollTo(0, 0);
    }

    function submitDigDeeper(vibe) {
      // Save the new vibe context
      userAnswers['vibe'] = vibe; 
      // Reset the pagination back to 0 so we see the fresh batch
      giftOffset = 0; 
      // Re-trigger the logic
      showLoadingState(); 
    }

    function handleRestart() {
      window.location.reload(); 
    }
    
    // Start the app
    renderQuestion();
  </script>
</body>
</html>
